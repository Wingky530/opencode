name: Build & Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --cwd packages/opencode build --skip-embed-web-ui
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-linux-arm64
          path: packages/opencode/dist/opencode-linux-arm64/
